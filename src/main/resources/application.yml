spring:
  datasource:
    url: ${DB_URL:jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pickly}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.MariaDBDialect}
  sql:
    init:
      mode: never
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://pickly-eta.vercel.app}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/callback}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-characters-long}
  expiration: ${JWT_EXPIRATION:86400000}

aws:
  s3:
    bucket: ${S3_BUCKET:pickly-images}
    region: ${AWS_REGION:ap-northeast-2}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

oauth:
  kakao:
    userinfo-url: https://kapi.kakao.com/v2/user/me
  naver:
    userinfo-url: https://openapi.naver.com/v1/nid/me
  google:
    userinfo-url: https://www.googleapis.com/oauth2/v3/userinfo

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}

gemini:
  api-key: ${GEMINI_API_KEY:}

openai:
  api-key: ${OPENAI_API_KEY:}
  api-url: https://api.openai.com/v1/chat/completions

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
