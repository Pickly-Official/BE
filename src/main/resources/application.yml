spring:
  # spring.security.oauth2 비활성화: 소셜 로그인 미사용 상태
  # 활성화 시 아래 주석 해제 + SecurityConfig에 oauth2Login() 블록 복구
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         kakao:
  #           client-id: ${KAKAO_CLIENT_ID}
  #           client-secret: ${KAKAO_CLIENT_SECRET:}
  #           redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
  #           authorization-grant-type: authorization_code
  #           client-authentication-method: client_secret_post
  #           scope:
  #             - profile_nickname
  #             - account_email
  #           client-name: Kakao
  #         google:
  #           client-id: ${GOOGLE_CLIENT_ID}
  #           client-secret: ${GOOGLE_CLIENT_SECRET}
  #           redirect-uri: ${GOOGLE_REDIRECT_URL}
  #           authorization-grant-type: authorization_code
  #           scope:
  #             - email
  #             - profile
  #       provider:
  #         kakao:
  #           authorization-uri: https://kauth.kakao.com/oauth/authorize
  #           token-uri: https://kauth.kakao.com/oauth/token
  #           user-info-uri: https://kapi.kakao.com/v2/user/me
  #           user-name-attribute: id
  datasource:
    url: jdbc:mariadb://localhost:3306/pickly?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1111
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-characters-long}
  expiration: ${JWT_EXPIRATION:86400000}

aws:
  s3:
    bucket: ${S3_BUCKET:pickly-images}
    region: ${AWS_REGION:ap-northeast-2}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

oauth:
  kakao:
    userinfo-url: https://kapi.kakao.com/v2/user/me
  naver:
    userinfo-url: https://openapi.naver.com/v1/nid/me
  google:
    userinfo-url: https://www.googleapis.com/oauth2/v3/userinfo

frontend:
  url: ${FRONTEND_URL:http://localhost:3000}

openai:
  api-key: ${OPENAI_API_KEY:}
  api-url: https://api.openai.com/v1/chat/completions

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html


logging:
  level:
    com.be: DEBUG
    org.springframework.security: DEBUG
